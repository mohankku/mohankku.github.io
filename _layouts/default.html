<!doctype html>
<html lang="{{ site.lang | default: "en-US" }}">
  <head>
    {% if site.google_analytics %}
      <!-- Google tag (gtag.js) -->
      <script async src="https://www.googletagmanager.com/gtag/js?id={{ site.google_analytics }}"></script>
      <script>
        window.dataLayer = window.dataLayer || [];
        function gtag(){dataLayer.push(arguments);}
        gtag('js', new Date());
        gtag('config', '{{ site.google_analytics }}');
      </script>
    {% endif %}

    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="chrome=1">

{% seo %}

    <link rel="stylesheet" href="{{ '/assets/css/style.css?v=' | append: site.github.build_revision | relative_url }}">
    <meta name="viewport" content="width=device-width">
    <!--[if lt IE 9]>
    <script src="//html5shiv.googlecode.com/svn/trunk/html5.js"></script>
    <![endif]-->
  </head>
  <body>
    <div class="wrapper">
      <header>
        <div class="header-content">
          <h1>{{ site.title | default: site.github.repository_name }}</h1>
          <p class="tagline">{{ site.email }}</p>
          
          <nav class="header-nav">
            <ul>
              <li><a href="{{ '/data/cv.pdf' | relative_url }}"><strong>CV</strong></a></li>
              <li><a href="https://scholar.google.com/citations?user=NVCULdIAAAAJ&hl=en"><strong>Google Scholar</strong></a></li>
            </ul>
          </nav>

          <div class="profile-section">
            <img src="{{ site.avatar | relative_url }}" alt="{{ site.title }}" class="profile-pic">
            <p class="contact-info">
              <strong>333 Airport Blvd</strong><br>
              Burlingame CA 94010<br>
              <a href="tel:+16507094897">(650) 709-4897</a>
            </p>
          </div>
        </div>
      </header>
      <section>

      {{ content }}

      </section>
      <!-- <footer> -->
      <!--   {% if site.github.is_project_page %} -->
      <!--   <p>This project is maintained by <a href="{{ site.github.owner_url }}">{{ site.github.owner_name }}</a></p> -->
      <!--   {% endif %} -->
      <!--   <p><small>Hosted on GitHub Pages &mdash; Theme by <a href="https://github.com/orderedlist">orderedlist</a></small></p> -->
      <!-- </footer> -->
    </div>
    <script src="{{ '/assets/js/scale.fix.js' | relative_url }}"></script>


  </body>
</html>
